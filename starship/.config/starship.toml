# ~/dotfiles/starship/.config/starship.toml

# --- Global Settings ---
add_newline = true
palette = "catppuccin_mocha"

# --- The Layout (Minimalist) ---
format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

right_format = """$cmd_duration"""

# --- Palette (No changes needed) ---
[palettes.catppuccin_mocha]
# ... (keep your existing colors) ...
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
base = "#1e1e2e"

# --- Module Configuration ---

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = false
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold yellow"

[git_status]
style = "bold yellow"
conflicted = "🏳"
up_to_date = ""
untracked = " "
modified = " "
staged = " "

# --- The Cursor ---
[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# --- Disable everything else just in case ---
[package]
disabled = true
[nodejs]
disabled = true
[elixir]
disabled = true
[java]
disabled = true
[docker_context]
disabled = true